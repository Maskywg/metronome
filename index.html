<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>節拍器 Metronome</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="節拍器">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- SEO -->
<meta name="description" content="可調整音效、拍號與計時的專業節拍器 PWA">
<meta property="og:title" content="節拍器 Metronome">
<meta property="og:description" content="六種音效・拍號設定・倒計時，免安裝直接使用">
<meta property="og:image" content="icon-512.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --text-muted: #7b7d8e;
    --beat-active: #6c63ff;
    --beat-accent: #ff6584;
    --beat-off: #252836;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 20px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    text-align: center;
  }
  h1 span { color: var(--accent); }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 520px;
    box-shadow: var(--shadow);
  }

  .section-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* ── BPM ── */
  .bpm-display {
    text-align: center;
    margin-bottom: 18px;
  }
  .bpm-number {
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -2px;
  }
  .bpm-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

  .bpm-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px 20px;
    transition: all 0.15s;
  }
  button:active { transform: scale(0.95); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 14px 36px;
    font-size: 1rem;
    border-radius: 50px;
    box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  }
  .btn-primary:hover { background: #7a72ff; }
  .btn-primary.active { background: var(--accent2); box-shadow: 0 4px 16px rgba(255,101,132,0.4); }

  .btn-sm {
    background: var(--surface2);
    color: var(--text);
    padding: 8px 16px;
    font-size: 0.85rem;
    border-radius: 8px;
  }
  .btn-sm:hover { background: #2f3347; }
  .btn-tap {
    background: var(--surface2);
    color: var(--accent);
    padding: 10px 24px;
    border: 2px solid var(--accent);
    border-radius: 50px;
  }
  .btn-tap:hover { background: rgba(108,99,255,0.15); }

  /* ── Beat grid ── */
  .beat-grid {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .beat-dot {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--beat-off);
    border: 2px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.08s;
    position: relative;
  }
  .beat-dot.accent {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .beat-dot.lit {
    background: var(--beat-active);
    color: #fff;
    box-shadow: 0 0 18px rgba(108,99,255,0.7);
    border-color: transparent;
  }
  .beat-dot.lit.accent {
    background: var(--beat-accent);
    box-shadow: 0 0 18px rgba(255,101,132,0.7);
  }

  /* ── Sound selector ── */
  .sound-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .sound-btn {
    background: var(--surface2);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 12px 8px;
    font-size: 0.82rem;
    text-align: center;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .sound-btn .icon { font-size: 1.4rem; }
  .sound-btn:hover { border-color: var(--accent); color: var(--text); }
  .sound-btn.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.15);
    color: var(--accent);
  }

  /* ── Signature ── */
  .sig-row {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
  }
  .sig-val {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    min-width: 48px;
    text-align: center;
  }
  .sig-btn {
    background: var(--surface2);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .sig-btn:hover { background: var(--accent); }

  /* ── Timer ── */
  .timer-display {
    text-align: center;
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text);
    margin: 12px 0;
    font-variant-numeric: tabular-nums;
  }
  .timer-display.running { color: var(--accent); }
  .timer-display.warning { color: var(--accent2); animation: pulse 0.6s infinite alternate; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .timer-mode {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .timer-mode button {
    flex: 1;
    background: transparent;
    color: var(--text-muted);
    border-radius: 0;
    padding: 10px;
    font-size: 0.85rem;
  }
  .timer-mode button.active {
    background: var(--accent);
    color: #fff;
  }

  .timer-set-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .time-input {
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 10px;
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    width: 68px;
    padding: 8px 4px;
    outline: none;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-colon { font-size: 1.4rem; font-weight: 700; color: var(--text-muted); }
  .time-label { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 3px; }

  /* ── Volume ── */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .vol-icon { font-size: 1.1rem; }

  /* ── Pendulum animation ── */
  .pendulum-wrap {
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin: 4px 0;
  }
  .pendulum-arm {
    width: 4px;
    height: 60px;
    background: linear-gradient(to bottom, var(--surface2), var(--accent));
    border-radius: 2px;
    transform-origin: top center;
    position: relative;
    transform: rotate(0deg);
    transition: none;
  }
  .pendulum-arm.swinging {
    animation: swing var(--swing-dur, 0.5s) ease-in-out infinite alternate;
  }
  .pendulum-bob {
    position: absolute;
    bottom: -14px; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px rgba(108,99,255,0.7);
  }

  @keyframes swing {
    from { transform: rotate(-30deg); }
    to   { transform: rotate(30deg);  }
  }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid var(--surface2); margin: 4px 0; }

  /* ── Scrollable body on small screens ── */
  @media (max-width: 400px) {
    .bpm-number { font-size: 3.8rem; }
    .timer-display { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<h1><span>♩</span> 節拍器</h1>

<!-- ── BPM Card ── -->
<div class="card">
  <div class="section-title">速度 Tempo</div>

  <div class="pendulum-wrap">
    <div class="pendulum-arm" id="pendulum">
      <div class="pendulum-bob"></div>
    </div>
  </div>

  <div class="bpm-display">
    <div class="bpm-number" id="bpmDisplay">120</div>
    <div class="bpm-label">BPM</div>
  </div>

  <div class="bpm-controls">
    <button class="sig-btn" onclick="changeBPM(-1)">−</button>
    <input type="range" id="bpmSlider" min="30" max="300" value="120" oninput="setBPM(this.value)">
    <button class="sig-btn" onclick="changeBPM(1)">+</button>
  </div>

  <div class="btn-row">
    <button class="btn-sm" onclick="changeBPM(-10)">−10</button>
    <button class="btn-sm" onclick="changeBPM(-5)">−5</button>
    <button class="btn-tap" id="tapBtn" onclick="tap()">Tap</button>
    <button class="btn-sm" onclick="changeBPM(5)">+5</button>
    <button class="btn-sm" onclick="changeBPM(10)">+10</button>
  </div>
</div>

<!-- ── Beat Grid & Controls ── -->
<div class="card">
  <div class="section-title">拍號 Time Signature</div>

  <div class="sig-row" style="margin-bottom:16px;">
    <div>
      <button class="sig-btn" onclick="changeBeats(-1)">−</button>
    </div>
    <div style="text-align:center;">
      <div class="sig-val" id="beatsDisplay">4</div>
      <div class="time-label">拍／小節</div>
    </div>
    <div>
      <button class="sig-btn" onclick="changeBeats(1)">+</button>
    </div>
    <div style="width:1px;background:var(--surface2);height:40px;margin:0 8px;"></div>
    <div style="text-align:center;">
      <div style="color:var(--text-muted);font-size:0.85rem;margin-bottom:2px;">強拍</div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="accentCheck" checked onchange="toggleAccent(this.checked)"
          style="width:18px;height:18px;accent-color:var(--accent);">
        <span style="font-size:0.85rem;">第1拍</span>
      </label>
    </div>
  </div>

  <div class="beat-grid" id="beatGrid"></div>
</div>

<!-- ── Sound Card ── -->
<div class="card">
  <div class="section-title">音效 Sound</div>
  <div class="sound-grid" id="soundGrid">
    <div class="sound-btn selected" data-sound="click" onclick="selectSound(this)">
      <span class="icon">🥁</span>Click
    </div>
    <div class="sound-btn" data-sound="wood" onclick="selectSound(this)">
      <span class="icon">🪵</span>Wood Block
    </div>
    <div class="sound-btn" data-sound="beep" onclick="selectSound(this)">
      <span class="icon">📡</span>電子聲
    </div>
    <div class="sound-btn" data-sound="sine" onclick="selectSound(this)">
      <span class="icon">🎵</span>音叉
    </div>
    <div class="sound-btn" data-sound="cowbell" onclick="selectSound(this)">
      <span class="icon">🔔</span>Cowbell
    </div>
    <div class="sound-btn" data-sound="hihat" onclick="selectSound(this)">
      <span class="icon">🎶</span>Hi-Hat
    </div>
  </div>

  <div style="margin-top:16px;">
    <div class="section-title">音量 Volume</div>
    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volSlider" min="0" max="100" value="80"
        oninput="setVolume(this.value)" style="flex:1;">
      <span class="vol-icon">🔊</span>
      <span id="volDisplay" style="font-size:0.85rem;color:var(--text-muted);min-width:36px;text-align:right;">80%</span>
    </div>
  </div>
</div>

<!-- ── Timer Card ── -->
<div class="card">
  <div class="section-title">計時器 Timer</div>

  <div class="timer-mode">
    <button id="modeCount" class="active" onclick="setTimerMode('count')">正計時 Count Up</button>
    <button id="modeDown" onclick="setTimerMode('down')">倒計時 Count Down</button>
  </div>

  <div id="timerSetRow" class="timer-set-row" style="display:none;">
    <div>
      <input type="number" class="time-input" id="setMin" min="0" max="99" value="5" placeholder="MM">
      <div class="time-label">分鐘</div>
    </div>
    <span class="time-colon">:</span>
    <div>
      <input type="number" class="time-input" id="setSec" min="0" max="59" value="0" placeholder="SS">
      <div class="time-label">秒</div>
    </div>
    <button class="btn-sm" style="margin-left:8px;" onclick="applyTimerSet()">設定</button>
  </div>

  <div class="timer-display" id="timerDisplay">00:00</div>

  <div class="btn-row">
    <button class="btn-primary" id="timerBtn" onclick="toggleTimer()">開始</button>
    <button class="btn-sm" onclick="resetTimer()">重設</button>
  </div>
</div>

<!-- ── Play Button ── -->
<button class="btn-primary" id="playBtn" style="max-width:520px;width:100%;font-size:1.1rem;padding:16px;" onclick="togglePlay()">
  ▶ 開始節拍
</button>


<script>
// ── State ──────────────────────────────────────────
let bpm = 120;
let beats = 4;
let currentBeat = -1;
let isPlaying = false;
let accentEnabled = true;
let selectedSound = 'click';
let volume = 0.8;
let intervalId = null;

// Timer state
let timerMode = 'count'; // 'count' | 'down'
let timerRunning = false;
let timerElapsed = 0;   // seconds elapsed (count up)
let timerTarget = 300;  // seconds (count down target)
let timerRemaining = 300;
let timerIntervalId = null;
let timerStartTime = null;

// Tap tempo
let tapTimes = [];

// ── WAV 生成（純 JS，不需 Web Audio API）────────────
const SR = 44100;

function makeWav(samples) {
  const n = samples.length;
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  const s = (o, t) => [...t].forEach((c, i) => v.setUint8(o + i, c.charCodeAt(0)));
  s(0,'RIFF'); v.setUint32(4, 36+n*2, true);
  s(8,'WAVE'); s(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,SR,true); v.setUint32(28,SR*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  s(36,'data'); v.setUint32(40,n*2,true);
  for (let i = 0; i < n; i++)
    v.setInt16(44+i*2, Math.max(-32767,Math.min(32767, samples[i]*32767)), true);
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}

function genSamples(type, accent) {
  const amp = accent ? 0.9 : 0.6;
  const configs = {
    click:   { dur:0.04, fn: (i,n) => (Math.random()*2-1)*Math.exp(-i/(n*0.08)) },
    wood:    { dur:0.08, fn: (i,n) => Math.sin(2*Math.PI*(accent?800:550)*i/SR * Math.exp(-i/(n*0.5)))*Math.exp(-i/(n*0.3)) },
    beep:    { dur:0.06, fn: (i,n) => (Math.sin(2*Math.PI*(accent?1200:800)*i/SR)>0?1:-1)*0.4*Math.exp(-i/(n*0.4)) },
    sine:    { dur:0.15, fn: (i,n) => Math.sin(2*Math.PI*(accent?880:440)*i/SR)*Math.exp(-i/(n*0.5)) },
    cowbell: { dur:0.20, fn: (i,n) => ((Math.sin(2*Math.PI*550*i/SR)>0?1:-1)+(Math.sin(2*Math.PI*844*i/SR)>0?1:-1))*0.25*Math.exp(-i/(n*0.4)) },
    hihat:   { dur:0.08, fn: (i,n) => (Math.random()*2-1)*Math.exp(-i/(n*0.3)) }
  };
  const c = configs[type];
  const n = Math.floor(SR * c.dur);
  return Float32Array.from({length:n}, (_,i) => c.fn(i,n) * amp);
}

// 預生成所有音效的 WAV URL
const soundUrls = {};
['click','wood','beep','sine','cowbell','hihat'].forEach(t => {
  soundUrls[t] = { accent: makeWav(genSamples(t,true)), normal: makeWav(genSamples(t,false)) };
});

// 播放聲音：HTML5 Audio（iOS 相容）
function playSound(isAccent) {
  const url = soundUrls[selectedSound][isAccent ? 'accent' : 'normal'];
  const a = new Audio(url);
  a.volume = volume;
  a.play().catch(() => {});
}

// ── Scheduler（performance.now 計時，不依賴 AudioContext）──
let schedTimer = null;
let nextBeatMs = 0;
const LOOKAHEAD_MS = 100;
const SCHED_MS = 25;

function scheduler() {
  const now = performance.now();
  while (nextBeatMs < now + LOOKAHEAD_MS) {
    const beat = currentBeat;
    const isAccent = accentEnabled && beat === 0;
    const delay = Math.max(0, nextBeatMs - now);
    setTimeout(() => { playSound(isAccent); updateBeatGridAt(beat); }, delay);
    currentBeat = (currentBeat + 1) % beats;
    nextBeatMs += 60000 / bpm;
  }
  schedTimer = setTimeout(scheduler, SCHED_MS);
}

function updateBeatGridAt(beat) {
  for (let i = 0; i < beats; i++) {
    const dot = document.getElementById(`beat-${i}`);
    if (!dot) continue;
    dot.className = 'beat-dot' + (i===0&&accentEnabled?' accent':'') + (i===beat?' lit':'');
  }
}

function startMetronome() {
  if (schedTimer) return;
  currentBeat = 0;
  nextBeatMs = performance.now();
  scheduler();
  updatePendulum(true);
}

function stopMetronome() {
  clearTimeout(schedTimer);
  schedTimer = null;
  currentBeat = -1;
  updateBeatGrid();
  updatePendulum(false);
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (!isPlaying) {
    isPlaying = true;
    btn.textContent = '⏹ 停止節拍';
    btn.classList.add('active');
    startMetronome();
  } else {
    isPlaying = false;
    stopMetronome();
    btn.textContent = '▶ 開始節拍';
    btn.classList.remove('active');
  }
}

function restartIfPlaying() {
  if (isPlaying) { stopMetronome(); startMetronome(); }
}

// ── BPM ──────────────────────────────────────────
function setBPM(val) {
  bpm = Math.max(30, Math.min(300, parseInt(val)));
  document.getElementById('bpmDisplay').textContent = bpm;
  document.getElementById('bpmSlider').value = bpm;
  setPendulumDuration();
  restartIfPlaying();
}

function changeBPM(delta) { setBPM(bpm + delta); }

function setPendulumDuration() {
  const dur = (60 / bpm).toFixed(3) + 's';
  document.documentElement.style.setProperty('--swing-dur', dur);
}

// ── Tap Tempo ─────────────────────────────────────
function tap() {
  const now = Date.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length > 1) {
    const gaps = [];
    for (let i = 1; i < tapTimes.length; i++) gaps.push(tapTimes[i] - tapTimes[i-1]);
    const avg = gaps.reduce((a,b) => a+b, 0) / gaps.length;
    setBPM(Math.round(60000 / avg));
  }
  // Feedback flash
  const btn = document.getElementById('tapBtn');
  btn.style.background = 'rgba(108,99,255,0.35)';
  setTimeout(() => btn.style.background = '', 100);
  // Reset taps after 2 seconds of inactivity
  clearTimeout(window._tapReset);
  window._tapReset = setTimeout(() => { tapTimes = []; }, 2000);
}

// ── Beats ────────────────────────────────────────
function changeBeats(delta) {
  beats = Math.max(1, Math.min(16, beats + delta));
  document.getElementById('beatsDisplay').textContent = beats;
  currentBeat = -1;
  buildBeatGrid();
  restartIfPlaying();
}

function buildBeatGrid() {
  const grid = document.getElementById('beatGrid');
  grid.innerHTML = '';
  for (let i = 0; i < beats; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot' + (i === 0 && accentEnabled ? ' accent' : '');
    dot.id = `beat-${i}`;
    dot.textContent = i + 1;
    grid.appendChild(dot);
  }
}

function updateBeatGrid() {
  for (let i = 0; i < beats; i++) {
    const dot = document.getElementById(`beat-${i}`);
    if (!dot) continue;
    dot.className = 'beat-dot' + (i === 0 && accentEnabled ? ' accent' : '') + (i === currentBeat ? ' lit' : '');
  }
}

function toggleAccent(val) {
  accentEnabled = val;
  buildBeatGrid();
}

// ── Sound ────────────────────────────────────────
function selectSound(el) {
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSound = el.dataset.sound;
  if (!isPlaying) playSound(true);
}

// ── Volume ───────────────────────────────────────
function setVolume(val) {
  volume = val / 100;
  document.getElementById('volDisplay').textContent = val + '%';
}

// ── Pendulum ──────────────────────────────────────
function updatePendulum(active) {
  const arm = document.getElementById('pendulum');
  if (active) { arm.classList.add('swinging'); setPendulumDuration(); }
  else         { arm.classList.remove('swinging'); arm.style.transform = 'rotate(0deg)'; }
}

// ── Timer ────────────────────────────────────────
function setTimerMode(mode) {
  timerMode = mode;
  document.getElementById('modeCount').classList.toggle('active', mode === 'count');
  document.getElementById('modeDown').classList.toggle('active',  mode === 'down');
  document.getElementById('timerSetRow').style.display = mode === 'down' ? 'flex' : 'none';
  resetTimer();
}

function applyTimerSet() {
  const m = parseInt(document.getElementById('setMin').value) || 0;
  const s = parseInt(document.getElementById('setSec').value) || 0;
  timerTarget = m * 60 + s;
  timerRemaining = timerTarget;
  updateTimerDisplay();
}

function toggleTimer() {
  if (!timerRunning) {
    timerRunning = true;
    timerStartTime = Date.now();
    const btn = document.getElementById('timerBtn');
    btn.textContent = '暫停';
    btn.classList.add('active');
    timerTick();
    timerIntervalId = setInterval(timerTick, 200);
  } else {
    pauseTimer();
  }
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerIntervalId);
  timerIntervalId = null;
  const btn = document.getElementById('timerBtn');
  btn.textContent = '繼續';
  btn.classList.remove('active');
}

function resetTimer() {
  clearInterval(timerIntervalId);
  timerIntervalId = null;
  timerRunning = false;
  timerElapsed = 0;
  timerRemaining = timerTarget;
  const btn = document.getElementById('timerBtn');
  btn.textContent = '開始';
  btn.classList.remove('active');
  updateTimerDisplay();
  document.getElementById('timerDisplay').classList.remove('running', 'warning');
}

function timerTick() {
  const now = Date.now();
  const delta = (now - timerStartTime) / 1000;
  timerStartTime = now;

  if (timerMode === 'count') {
    timerElapsed += delta;
    updateTimerDisplay();
    document.getElementById('timerDisplay').classList.add('running');
  } else {
    timerRemaining -= delta;
    if (timerRemaining <= 0) {
      timerRemaining = 0;
      updateTimerDisplay();
      timerFinished();
      return;
    }
    const el = document.getElementById('timerDisplay');
    el.classList.add('running');
    if (timerRemaining <= 10) { el.classList.add('warning'); el.classList.remove('running'); }
    else el.classList.remove('warning');
    updateTimerDisplay();
  }
}

function timerFinished() {
  clearInterval(timerIntervalId);
  timerIntervalId = null;
  timerRunning = false;
  document.getElementById('timerBtn').textContent = '開始';
  document.getElementById('timerBtn').classList.remove('active');
  // 結束提示音（三響，用 HTML5 Audio）
  [0, 200, 400].forEach(delay => setTimeout(() => playSound(true), delay));
  setTimeout(() => {
    document.getElementById('timerDisplay').classList.remove('running','warning');
  }, 1000);
}

function updateTimerDisplay() {
  let sec = timerMode === 'count' ? Math.floor(timerElapsed) : Math.max(0, Math.floor(timerRemaining));
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

// ── Init ─────────────────────────────────────────
buildBeatGrid();
setPendulumDuration();
applyTimerSet();
updateTimerDisplay();

// ── PWA Service Worker ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
